services:

  # ── Service ML (faypal_ML) ────────────────────────────────
  ml_service:
    build: ../faypal_ML/faypal_ML
    container_name: faypal_ml
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Base de données PostgreSQL + PostGIS ──────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: faypal_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: moussa
      POSTGRES_DB: faypal_db
    ports:
      - "5433:5432"
    volumes:
      - faypal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API FastAPI ───────────────────────────────────────────
  api:
    build: .
    container_name: faypal_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:moussa@db:5432/faypal_db
      SECRET_KEY: faypal_secret_key_change_en_production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENV: development
      DEBUG: "True"
      ML_SERVICE_URL: http://ml_service:8001
      ML_SERVICE_TIMEOUT: "10"
    depends_on:
      db:
        condition: service_healthy
      ml_service:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── pgAdmin ───────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: faypal_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@faypal.sn
      PGADMIN_DEFAULT_PASSWORD: moussa
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  faypal_postgres_data: