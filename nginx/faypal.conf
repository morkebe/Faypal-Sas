# ══════════════════════════════════════════════════════════════════
# FAYPAL — Nginx reverse proxy (VPS)
# Remplace VOTRE_DOMAINE par ton domaine réel (ex: faypal.sn)
#
# Installation :
#   sudo cp faypal.conf /etc/nginx/sites-available/faypal
#   sudo ln -s /etc/nginx/sites-available/faypal /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d app.VOTRE_DOMAINE -d api.VOTRE_DOMAINE
#   sudo nginx -t && sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════════

# ── Redirection HTTP → HTTPS ───────────────────────────────────
server {
    listen 80;
    server_name app.VOTRE_DOMAINE api.VOTRE_DOMAINE;
    return 301 https://$host$request_uri;
}

# ── Frontend React ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name app.VOTRE_DOMAINE;

    # Certificats SSL (générés par certbot)
    ssl_certificate     /etc/letsencrypt/live/app.VOTRE_DOMAINE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.VOTRE_DOMAINE/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Sécurité
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Proxy vers le container frontend (port 3000)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Backend API FastAPI ────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.VOTRE_DOMAINE;

    # Certificats SSL
    ssl_certificate     /etc/letsencrypt/live/api.VOTRE_DOMAINE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.VOTRE_DOMAINE/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Sécurité
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Taille max des requêtes (données capteurs)
    client_max_body_size 10M;

    # Compression
    gzip on;
    gzip_types application/json text/plain;

    # Proxy vers le container backend (port 8000)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts généreux pour les calculs ML
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # CORS preflight — géré par FastAPI, mais on accélère ici
    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
