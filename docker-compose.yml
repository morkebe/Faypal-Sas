services:

  # ── Base de données PostgreSQL + PostGIS ──────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    container_name: faypal_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - faypal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Service ML ────────────────────────────────────────────────────────────
  ml_service:
    build: ./faypal-ml
    container_name: faypal_ml
    volumes:
      - ./faypal-ml/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── API FastAPI ───────────────────────────────────────────────────────────
  api:
    build: ./faypal-backend
    container_name: faypal_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ENV: development
      DEBUG: "True"
      ML_SERVICE_URL: http://ml_service:8001
      ML_SERVICE_TIMEOUT: "10"
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@faypal.sn}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Faypal2025!}
      ADMIN_NOM: ${ADMIN_NOM:-Administrateur}
    depends_on:
      db:
        condition: service_healthy
      ml_service:
        condition: service_healthy
    volumes:
      - ./faypal-backend:/app
    command: sh -c "alembic upgrade head && python init_admin.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    restart: unless-stopped

  # ── Frontend React/Vite (nginx) ───────────────────────────────────────────
  frontend:
    build:
      context: ./Faypal-saas
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: faypal_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── pgAdmin ───────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: faypal_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  faypal_postgres_data:
