server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — toutes les routes renvoient index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache long pour les assets buildés (hash dans le nom de fichier)
    location ~* \.(js|css|woff|woff2|svg|ico|png|jpg|jpeg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache pour index.html
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
